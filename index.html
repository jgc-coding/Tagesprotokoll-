<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protokoll">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tagesprotokoll</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #faf7f2;
    --ink: #1a1612;
    --muted: #9a8f82;
    --accent: #c0392b;
    --green: #2d6a4f;
    --line: #e2ddd6;
    --shadow: rgba(26,22,18,0.08);
  }

  html { height: 100%; }

  body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse at 80% 0%, rgba(192,57,43,0.05) 0%, transparent 55%);
  }

  /* TOP BAR */
  .topbar {
    background: var(--ink);
    color: var(--bg);
    padding: 0.85rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 0.8rem;
  }
  .topbar-left { display: flex; align-items: baseline; gap: 0.7rem; flex: 1; min-width: 0; }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 1.2rem;
    letter-spacing: -0.01em; line-height: 1; flex-shrink: 0;
  }
  .topbar-date {
    font-size: 0.63rem; color: rgba(245,240,232,0.5);
    letter-spacing: 0.05em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar-clock {
    font-family: 'Fraunces', serif; font-style: italic;
    font-weight: 300; font-size: 1.35rem; color: var(--accent); flex-shrink: 0;
  }

  /* INPUT */
  .input-wrap {
    background: var(--paper);
    border-bottom: 1.5px solid var(--line);
    padding: 0.75rem 1rem;
    flex-shrink: 0;
    box-shadow: 0 2px 10px var(--shadow);
  }
  .input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
  .input-time {
    font-size: 0.68rem; color: var(--accent);
    white-space: nowrap; padding-bottom: 0.5rem;
    letter-spacing: 0.03em; min-width: 38px; flex-shrink: 0;
  }
  #entry-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'DM Mono', monospace; font-size: 1rem;
    color: var(--ink); resize: none; line-height: 1.5;
    min-height: 2rem; max-height: 5.5rem; -webkit-appearance: none;
  }
  #entry-input::placeholder { color: var(--muted); }
  .add-btn {
    background: var(--accent); color: white; border: none;
    width: 2.4rem; height: 2.4rem; font-size: 1.3rem; line-height: 1;
    cursor: pointer; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .add-btn:active { transform: scale(0.92); }

  .mic-btn {
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--line);
    width: 2.4rem; height: 2.4rem; line-height: 1;
    cursor: pointer; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn svg { width: 1.05rem; height: 1.05rem; }
  .mic-btn:active { transform: scale(0.92); }
  .mic-btn.recording {
    background: var(--accent); color: white; border-color: var(--accent);
    animation: micpulse 1.3s ease-out infinite;
  }
  .mic-btn.unsupported { opacity: 0.35; cursor: not-allowed; }
  @keyframes micpulse {
    0%   { box-shadow: 0 0 0 0   rgba(192,57,43,0.45); }
    70%  { box-shadow: 0 0 0 10px rgba(192,57,43,0);    }
    100% { box-shadow: 0 0 0 0   rgba(192,57,43,0);    }
  }

  /* QUICK ENTRIES */
  .quick-wrap {
    background: var(--bg);
    border-bottom: 1.5px solid var(--line);
    padding: 0.55rem 1rem;
    flex-shrink: 0;
    display: flex;
    gap: 0.45rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-wrap::-webkit-scrollbar { display: none; }
  .quick-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.38rem 0.75rem;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .quick-btn:active { transform: scale(0.95); }
  .quick-btn.flash {
    background: var(--green) !important;
    color: white !important;
    border-color: var(--green) !important;
  }

  /* ENTRIES */
  .entries-wrap {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 1rem 1rem; min-height: 0;
  }
  .date-sep {
    font-size: 0.63rem; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 1rem 0 0.3rem; border-bottom: 1px solid var(--line);
  }
  .entry {
    display: flex; gap: 0.8rem;
    padding: 0.85rem 0; border-bottom: 1px solid var(--line);
  }
  .entry-time {
    font-size: 0.68rem; color: var(--accent); white-space: nowrap;
    padding-top: 0.12rem; min-width: 38px; letter-spacing: 0.02em; flex-shrink: 0;
  }
  .entry-text {
    flex: 1; font-size: 0.9rem; line-height: 1.55; color: var(--ink);
    white-space: pre-wrap; word-break: break-word; min-width: 0;
  }
  .del-btn {
    background: none; border: none; color: var(--line); font-size: 0.95rem;
    padding: 0.1rem 0.25rem; cursor: pointer; align-self: flex-start;
    margin-top: 0.1rem; flex-shrink: 0; transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .del-btn:active { color: var(--accent); }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty .big {
    font-family: 'Fraunces', serif; font-style: italic;
    font-weight: 300; font-size: 1.25rem; margin-bottom: 0.4rem;
  }
  .empty small { font-size: 0.7rem; }

  /* BOTTOM BAR */
  .bottombar {
    background: var(--paper); border-top: 1px solid var(--line);
    padding: 0.55rem 1rem; display: flex; align-items: center;
    gap: 0.5rem; flex-shrink: 0;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background 0.4s;
  }
  .sync-dot.ok      { background: var(--green); }
  .sync-dot.syncing { background: #e67e22; animation: blink 1s infinite; }
  .sync-dot.err     { background: var(--accent); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #sync-text {
    color: var(--muted); font-size: 0.63rem; letter-spacing: 0.04em;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Während Modell-Download / Aufnahme / Transkription: Buttons ausblenden,
     Status-Text bekommt die volle Breite und wird prominent */
  .bottombar.busy .bottom-btn,
  .bottombar.busy .app-version,
  .bottombar.busy .export-wrap { display: none; }
  .bottombar.busy #sync-text {
    font-size: 0.8rem; color: var(--ink); letter-spacing: 0.02em;
  }
  .bottom-btn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    padding: 0.28rem 0.6rem; border-radius: 2px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-btn:active { border-color: var(--ink); color: var(--ink); }
  .bottom-btn.danger { color: var(--accent); border-color: rgba(192,57,43,0.3); }

  .app-version {
    color: var(--muted);
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    opacity: 0.6;
    flex-shrink: 0;
    margin: 0 0.25rem;
    white-space: nowrap;
  }
  /* EXPORT MENU */
  .export-wrap { position: relative; flex-shrink: 0; }
  .export-menu {
    display: none;
    position: absolute;
    bottom: calc(100% + 0.4rem);
    right: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: 0 4px 16px var(--shadow);
    overflow: hidden;
    min-width: 170px;
    z-index: 10;
  }
  .export-menu.open { display: block; }
  .export-menu button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 0.6rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink);
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .export-menu button:last-child { border-bottom: none; }
  .export-menu button:active { background: var(--bg); }
  .export-menu .hint {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.15rem;
    letter-spacing: 0;
  }

  /* ARCHIVE VIEW */
  body.view-archive .input-wrap,
  body.view-archive .quick-wrap { display: none; }

  .archive-header {
    padding: 1rem 0 0.4rem;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 0.6rem;
  }
  .archive-title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 1.1rem; letter-spacing: -0.01em;
  }
  .archive-stats {
    font-size: 0.63rem; color: var(--muted);
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .archive-item {
    padding: 0.85rem 0; border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 0.35rem;
  }
  .archive-row1 {
    display: flex; align-items: center; gap: 0.55rem;
    font-size: 0.68rem; letter-spacing: 0.03em;
  }
  .archive-format {
    background: var(--ink); color: var(--bg);
    padding: 0.12rem 0.45rem; border-radius: 2px;
    font-weight: 500; letter-spacing: 0.06em;
  }
  .archive-format.pdf { background: var(--accent); }
  .archive-format.md  { background: var(--green); }
  .archive-date  { color: var(--muted); }
  .archive-size  { color: var(--muted); margin-left: auto; }
  .archive-name {
    font-size: 0.85rem; color: var(--ink); word-break: break-all;
  }
  .archive-actions { display: flex; gap: 0.4rem; margin-top: 0.2rem; }
  .archive-actions button {
    background: var(--paper); border: 1px solid var(--line);
    color: var(--ink); font-family: 'DM Mono', monospace;
    font-size: 0.65rem; padding: 0.3rem 0.7rem; border-radius: 2px;
    cursor: pointer; letter-spacing: 0.03em;
    -webkit-tap-highlight-color: transparent;
  }
  .archive-actions button.danger {
    color: var(--accent); border-color: rgba(192,57,43,0.3);
  }
  .archive-actions button:active { transform: scale(0.96); }
  .bottom-btn.active {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
  }
</style>
</head>

<div class="topbar">
  <div class="topbar-left">
    <h1>Tagesprotokoll</h1>
    <span class="topbar-date" id="top-date">—</span>
  </div>
  <div class="topbar-clock" id="top-clock">—</div>
</div>

<div class="input-wrap">
  <div class="input-row">
    <span class="input-time" id="input-time">—</span>
    <textarea id="entry-input" rows="1" placeholder="Was ist gerade passiert?"></textarea>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="Diktieren" title="Diktieren (Spracheingabe)">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>

<!-- Whisper-Transkription (lokal im Browser über transformers.js) -->
<script type="module">
  const MODEL_ID = 'Xenova/whisper-base';

  let _pipelinePromise = null;
  let _pipelineReady   = false;
  async function getPipeline(onProgress) {
    if (!_pipelinePromise) {
      _pipelinePromise = (async () => {
        const { pipeline, env } = await import(
          'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/+esm'
        );
        env.allowLocalModels = false;
        env.useBrowserCache  = true;
        const p = await pipeline('automatic-speech-recognition', MODEL_ID, {
          progress_callback: onProgress,
          quantized: true,
        });
        _pipelineReady = true;
        return p;
      })().catch(err => { _pipelinePromise = null; throw err; });
    }
    return _pipelinePromise;
  }

  window.whisperIsReady = () => _pipelineReady;
  window.whisperPreload = (cb) => getPipeline(cb).then(() => true).catch(() => false);

  window.whisperTranscribe = async (blob, onProgress) => {
    const transcriber = await getPipeline(onProgress);
    const arrayBuf = await blob.arrayBuffer();
    const Ctx = window.AudioContext || window.webkitAudioContext;
    // 16 kHz mono ist das, was Whisper erwartet
    const audioCtx = new Ctx({ sampleRate: 16000 });
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
    const samples = audioBuffer.getChannelData(0);
    audioCtx.close();
    const result = await transcriber(samples, {
      language: 'german',
      task: 'transcribe',
      chunk_length_s: 30,
      stride_length_s: 5,
    });
    return (result && result.text ? result.text : '').trim();
  };
</script>

<script>
// ─── APP VERSION ─────────────────────────────────────
// Bei jedem Deploy um 1 erhöhen!
const APP_VERSION = 10;

// ─── STATE ───────────────────────────────────────────
let entries   = JSON.parse(localStorage.getItem('proto_v2') || '[]');
let saveTimer = null;
const ta      = document.getElementById('entry-input');
const addBtn  = document.getElementById('add-btn');

// ─── CLOCK ───────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('top-clock').textContent =
    n.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('top-date').textContent =
    n.toLocaleDateString('de-DE', { weekday:'short', day:'numeric', month:'short' });
  document.getElementById('input-time').textContent =
    n.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
}
tick();
setInterval(tick, 15000);

// ─── TEXTAREA AUTO-RESIZE ────────────────────────────
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 88) + 'px';
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addEntry(); }
});

// ─── SAVE ────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('proto_v2', JSON.stringify(entries));
    const t = new Date().toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
    setSync('ok', `Gespeichert · ${t}`);
  } catch(e) { setSync('err', 'Speichern fehlgeschlagen!'); }
}
function scheduleSave() {
  setSync('syncing', 'Speichert…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 800);
}
function setSync(type, msg, busy) {
  document.getElementById('sync-dot').className = 'sync-dot' +
    (type==='ok' ? ' ok' : type==='syncing' ? ' syncing' : type==='err' ? ' err' : '');
  document.getElementById('sync-text').textContent = msg;
  document.querySelector('.bottombar').classList.toggle('busy', !!busy);
}

// ─── ADD ENTRY ───────────────────────────────────────
function addEntry() {
  // Während einer laufenden Whisper-Verarbeitung keine Eingabe übernehmen
  if (micState === 'recording' || micState === 'transcribing' || micState === 'loading') {
    alert('Bitte warten — Aufnahme/Transkription läuft noch.');
    return;
  }

  const text = ta.value.trim();
  if (!text) return;

  // Sofortiges Button-Feedback
  addBtn.textContent = '✓';
  addBtn.style.background = 'var(--green)';
  setTimeout(() => { addBtn.textContent = '＋'; addBtn.style.background = ''; }, 900);

  // Eintrag erstellen
  const now = new Date();
  const entry = {
    id:   Date.now(),
    date: now.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' }),
    time: now.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }),
    text, iso: now.toISOString()
  };
  entries.unshift(entry);
  scheduleSave();

  // Textarea leeren
  ta.value = '';
  ta.style.height = 'auto';

  // SOFORT DOM aktualisieren (kein setTimeout, kein blur zuerst)
  injectEntry(entry);

  // Keyboard erst danach schließen
  setTimeout(() => ta.blur(), 80);
}

// ─── DOM: neuen Eintrag einbauen ─────────────────────
function injectEntry(entry) {
  const wrap  = document.getElementById('entries-wrap');
  const empty = document.getElementById('empty-state');
  if (empty) empty.style.display = 'none';

  const today = entry.date;

  // Existiert schon ein Separator für heute?
  let sep = wrap.querySelector(`.date-sep[data-date="${today}"]`);
  if (!sep) {
    sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.dataset.date = today;
    sep.textContent = 'Heute';
    wrap.insertBefore(sep, wrap.firstChild);
  }

  // Eintrag direkt nach Separator einfügen
  const div = document.createElement('div');
  div.className = 'entry';
  div.dataset.id = entry.id;
  div.innerHTML =
    `<div class="entry-time">${entry.time}</div>` +
    `<div class="entry-text">${esc(entry.text)}</div>` +
    `<button class="del-btn" onclick="deleteEntry(${entry.id})">✕</button>`;
  sep.insertAdjacentElement('afterend', div);

  wrap.scrollTop = 0;
}

// ─── FULL RENDER (nur beim Start) ────────────────────
function renderAll() {
  const wrap = document.getElementById('entries-wrap');
  wrap.innerHTML = '';

  if (!entries.length) {
    wrap.innerHTML =
      '<div class="empty" id="empty-state">' +
      '<div class="big">Noch nichts notiert</div>' +
      '<small>Schreib oben deinen ersten Eintrag</small></div>';
    return;
  }

  // Unsichtbarer empty-state als Referenz
  wrap.insertAdjacentHTML('beforeend', '<div id="empty-state" style="display:none"></div>');

  const today = new Date().toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' });
  const groups = {};
  entries.forEach(e => { (groups[e.date] = groups[e.date] || []).push(e); });

  Object.keys(groups).forEach(date => {
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.dataset.date = date;
    sep.textContent = date === today ? 'Heute' : date;
    wrap.appendChild(sep);

    groups[date].forEach(e => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.dataset.id = e.id;
      div.innerHTML =
        `<div class="entry-time">${e.time}</div>` +
        `<div class="entry-text">${esc(e.text)}</div>` +
        `<button class="del-btn" onclick="deleteEntry(${e.id})">✕</button>`;
      wrap.appendChild(div);
    });
  });
}

// ─── DELETE ──────────────────────────────────────────
function deleteEntry(id) {
  if (!confirm('Eintrag löschen?')) return;
  entries = entries.filter(e => e.id !== id);

  const el = document.querySelector(`.entry[data-id="${id}"]`);
  if (el) el.remove();

  // Leere Separatoren entfernen
  document.querySelectorAll('.date-sep').forEach(s => {
    const next = s.nextElementSibling;
    if (!next || !next.classList.contains('entry')) s.remove();
  });

  if (!entries.length) {
    const wrap = document.getElementById('entries-wrap');
    wrap.innerHTML =
      '<div class="empty" id="empty-state">' +
      '<div class="big">Noch nichts notiert</div>' +
      '<small>Schreib oben deinen ersten Eintrag</small></div>';
  }

  scheduleSave();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ─── CLEAR / EXPORT ──────────────────────────────────
function clearAll() {
  if (!entries.length) return;
  if (confirm(`Alle ${entries.length} Einträge löschen?`)) {
    entries = []; scheduleSave(); renderAll();
  }
}

// ─── ARCHIV (IndexedDB) ──────────────────────────────
const DB_NAME = 'proto_db';
const DB_STORE = 'exports';
let _dbPromise = null;
let _archiveAvailable = true;

function db() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error('no-indexeddb')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
  _dbPromise.catch(() => { _archiveAvailable = false; });
  return _dbPromise;
}

async function archivePut(item) {
  try {
    const d = await db();
    await new Promise((resolve, reject) => {
      const tx = d.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).add(item);
      tx.oncomplete = () => resolve();
      tx.onerror    = () => reject(tx.error);
    });
    if (currentView === 'archive') renderArchive();
  } catch (e) {
    console.warn('Archiv nicht verfügbar:', e);
  }
}

async function archiveList() {
  try {
    const d = await db();
    return await new Promise((resolve, reject) => {
      const items = [];
      const tx = d.transaction(DB_STORE, 'readonly');
      tx.objectStore(DB_STORE).openCursor(null, 'prev').onsuccess = (e) => {
        const c = e.target.result;
        if (c) { items.push(c.value); c.continue(); }
        else resolve(items);
      };
      tx.onerror = () => reject(tx.error);
    });
  } catch (e) { return []; }
}

async function archiveGet(id) {
  const d = await db();
  return await new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function archiveDelete(id) {
  const d = await db();
  await new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(2) + ' MB';
}
function fmtArchiveDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' }) +
         ' ' +
         d.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
}

// ─── EXPORT HELPERS ──────────────────────────────────
function groupByDate(list) {
  const groups = {};
  const order  = [];
  list.forEach(e => {
    if (!groups[e.date]) { groups[e.date] = []; order.push(e.date); }
    groups[e.date].push(e);
  });
  return { groups, order };
}
function wrapLine(line, width) {
  if (line.length <= width) return line;
  const out = [];
  while (line.length > width) {
    let cut = line.lastIndexOf(' ', width);
    if (cut <= 0) cut = width;
    out.push(line.slice(0, cut));
    line = line.slice(line[cut] === ' ' ? cut + 1 : cut);
  }
  out.push(line);
  return out.join('\n');
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function download(filename, content, mime) {
  const url = URL.createObjectURL(new Blob([content], { type: mime }));
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function todayStamp() {
  return new Date().toLocaleDateString('de-DE',
    { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\./g,'-');
}

// ─── EXPORT: TXT ─────────────────────────────────────
// UTF-8 BOM für Windows-Notepad, Zeilen auf ~65 Zeichen umgebrochen
function exportTxt() {
  if (!entries.length) { alert('Keine Einträge.'); return; }
  const { groups, order } = groupByDate([...entries].reverse());
  let out = `TAGESPROTOKOLL\n${'='.repeat(40)}\n\n`;
  order.forEach(date => {
    out += `${date}\n${'-'.repeat(date.length)}\n\n`;
    groups[date].forEach(e => {
      const wrapped = wrapLine(e.text, 65).replace(/\n/g, '\n         ');
      out += `[${e.time}]  ${wrapped}\n\n`;
    });
  });
  const filename = `protokoll_${todayStamp()}.txt`;
  const content  = '﻿' + out;
  const mime     = 'text/plain;charset=utf-8';
  download(filename, content, mime);
  archivePut({ kind:'txt', filename, content, mime, ts: Date.now(),
               size: new Blob([content]).size, entryCount: entries.length });
  closeExportMenu();
}

// ─── EXPORT: MARKDOWN ────────────────────────────────
function exportMd() {
  if (!entries.length) { alert('Keine Einträge.'); return; }
  const { groups, order } = groupByDate([...entries].reverse());
  let out = `# Tagesprotokoll\n\n_Stand: ${new Date().toLocaleDateString('de-DE',
    { weekday:'long', day:'2-digit', month:'long', year:'numeric' })}_\n\n`;
  order.forEach(date => {
    out += `## ${date}\n\n`;
    groups[date].forEach(e => {
      const text = e.text.replace(/\n/g, '  \n  ');
      out += `- **${e.time}** — ${text}\n`;
    });
    out += `\n`;
  });
  const filename = `protokoll_${todayStamp()}.md`;
  const mime     = 'text/markdown;charset=utf-8';
  download(filename, out, mime);
  archivePut({ kind:'md', filename, content: out, mime, ts: Date.now(),
               size: new Blob([out]).size, entryCount: entries.length });
  closeExportMenu();
}

const QUICK = [
  'Ende der vorherigen Aktion',
  'Wasserhahn an',
  'Wasserhahn aus',
  'Eigene Hände waschen',
  'Tür aufmachen',
  'Boden wischen',

function buildQuickBar() {

  QUICK.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = label;

function quickEntry(text) {
  const now = new Date();
  const entry = {
    id:   Date.now(),
    date: now.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric' }),
    time: now.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' }),
    text, iso: now.toISOString()
  };

  scheduleSave();
  injectEntry(entry);
}

// ─── SPRACHEINGABE (Whisper, lokal im Browser) ───────
// MediaRecorder nimmt Audio auf, transformers.js (im Modul-Script) lädt
// Whisper-Base nach und transkribiert. Kein Auto-Stopp — der Nutzer
// entscheidet, wann die Aufnahme zu Ende ist.

let mediaStream  = null;
let mediaRecorder = null;
let recordChunks  = [];
let micState      = 'idle'; // 'idle' | 'loading' | 'recording' | 'transcribing'

function initMic() {
  const btn = document.getElementById('mic-btn');
  const supported =
    !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) &&
    !!window.MediaRecorder &&
    !!(window.AudioContext || window.webkitAudioContext);
  if (!supported) {
    btn.classList.add('unsupported');
    btn.title = 'Aufnahme in diesem Browser nicht unterstützt';
    btn.onclick = () => alert(
      'Audio-Aufnahme wird in diesem Browser nicht unterstützt.\n' +
      'Bitte Chrome, Edge oder Safari (aktuelle Version) verwenden.'
    );
    return;
  }
  btn.title = 'Diktieren (Whisper, lokal)';
}

function paintMic(on) {
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('recording', on);
}

async function toggleMic() {
  if (micState === 'recording')      { stopRecording(); return; }
  if (micState !== 'idle')           return; // 'loading' oder 'transcribing': ignorieren

  // Erster Tap und Modell noch nicht da → erst nur das Modell laden,
  // keine Aufnahme. Nächster Tap startet dann sofort die Aufnahme.
  if (typeof window.whisperIsReady === 'function' && !window.whisperIsReady()) {
    micState = 'loading';
    setSync('syncing', 'Lädt Sprachmodell (einmalig, ~80 MB)…', true);
    try {
      await window.whisperPreload(handleModelProgress);
      setSync('ok', 'Sprachmodell bereit — Mikro tippen zum Aufnehmen', false);
    } catch(e) {
      setSync('err', 'Modell konnte nicht geladen werden — Verbindung prüfen', false);
    }
    micState = 'idle';
    return;
  }

  startRecording();
}

async function startRecording() {
  micState = 'loading';
  setSync('syncing', 'Mikrofon wird angefragt…', true);
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setSync('err', 'Mikrofon-Zugriff verweigert', false);
    micState = 'idle';
    return;
  }

  recordChunks = [];
  const mime = pickAudioMime();
  try {
    mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime })
                         : new MediaRecorder(mediaStream);
  } catch(e) {
    setSync('err', 'Aufnahme konnte nicht gestartet werden', false);
    cleanupStream();
    micState = 'idle';
    return;
  }
  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) recordChunks.push(e.data);
  };
  mediaRecorder.onstop = onRecordingStopped;
  mediaRecorder.start();
  micState = 'recording';
  paintMic(true);
  setSync('syncing', 'Aufnahme läuft — Mikro tippen zum Stoppen', true);
  ta.focus();
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  setSync('syncing', 'Aufnahme wird beendet…', true);
  try { mediaRecorder.stop(); } catch(_) {}
  // onstop kümmert sich um den Rest
}

async function onRecordingStopped() {
  cleanupStream();
  paintMic(false);

  if (!recordChunks.length) {
    setSync('ok', 'Nichts aufgenommen', false);
    micState = 'idle';
    return;
  }
  micState = 'transcribing';
  setSync('syncing', 'Transkribiere…', true);

  const blob = new Blob(recordChunks, { type: recordChunks[0].type || 'audio/webm' });
  recordChunks = [];

  if (typeof window.whisperTranscribe !== 'function') {
    setSync('err', 'Whisper-Modul nicht geladen', false);
    micState = 'idle';
    return;
  }

  let text = '';
  try {
    text = await window.whisperTranscribe(blob, handleModelProgress);
  } catch(e) {
    console.error(e);
    setSync('err', 'Transkription fehlgeschlagen', false);
    micState = 'idle';
    return;
  }

  if (text) {
    const existing = ta.value.trim();
    ta.value = existing ? existing + ' ' + text : text;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 88) + 'px';
    setSync('ok', 'Fertig', false);
  } else {
    setSync('ok', 'Kein Text erkannt', false);
  }
  micState = 'idle';
}

function handleModelProgress(p) {
  if (!p) return;
  if (p.status === 'progress' && typeof p.progress === 'number') {
    setSync('syncing', `Lädt Sprachmodell… ${Math.round(p.progress)} %`, true);
  } else if (p.status === 'download') {
    setSync('syncing', `Lädt ${p.file || 'Modell'}…`, true);
  }
  // 'ready'/'done' bewusst ignorieren — Folge-Statusmeldung kommt vom Aufrufer
}

function pickAudioMime() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/mp4',
    'audio/ogg;codecs=opus',
  ];
  for (const m of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

function cleanupStream() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
}

// Kompatibilitäts-Aliase für alte Aufrufstellen (z.B. addEntry)
function stopMic() {
  if (micState === 'recording') stopRecording();
}

// ─── VIEW TOGGLE: ENTRIES <-> ARCHIVE ────────────────
let currentView = 'entries';

function toggleView() {
  if (currentView === 'entries') showArchive();
  else                           showEntries();
}

function showEntries() {
  currentView = 'entries';
  document.body.classList.remove('view-archive');
  document.getElementById('archive-btn').classList.remove('active');
  document.getElementById('archive-btn').textContent = '📁 Archiv';
  renderAll();
}

async function showArchive() {
  currentView = 'archive';
  document.body.classList.add('view-archive');
  const btn = document.getElementById('archive-btn');
  btn.classList.add('active');
  btn.textContent = '← Zurück';
  await renderArchive();
}

async function renderArchive() {
  const wrap = document.getElementById('entries-wrap');
  wrap.innerHTML = '';

  const items = await archiveList();
  const totalSize = items.reduce((s, x) => s + (x.size || 0), 0);

  const head = document.createElement('div');
  head.className = 'archive-header';
  head.innerHTML =
    `<span class="archive-title">Archiv</span>` +
    `<span class="archive-stats">${items.length} ${items.length === 1 ? 'Datei' : 'Dateien'} · ${fmtSize(totalSize)}</span>`;
  wrap.appendChild(head);

  if (!items.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML =
      '<div class="big">Noch keine Exporte</div>' +
      '<small>Exportiere ein Protokoll, es landet hier automatisch.</small>';
    wrap.appendChild(empty);
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'archive-item';
    const label = item.kind === 'pdf' ? 'PDF' : item.kind.toUpperCase();
    const openLabel = item.kind === 'pdf' ? '↗ Öffnen / Drucken' : '↓ Speichern';
    div.innerHTML =
      `<div class="archive-row1">` +
        `<span class="archive-format ${item.kind}">${label}</span>` +
        `<span class="archive-date">${fmtArchiveDate(item.ts)}</span>` +
        `<span class="archive-size">${fmtSize(item.size || 0)}</span>` +
      `</div>` +
      `<div class="archive-name">${esc(item.filename)}</div>` +
      `<div class="archive-actions">` +
        `<button onclick="openArchive(${item.id})">${openLabel}</button>` +
        `<button class="danger" onclick="deleteArchive(${item.id})">Löschen</button>` +
      `</div>`;
    wrap.appendChild(div);
  });
}

async function openArchive(id) {
  const item = await archiveGet(id);
  if (!item) return;
  if (item.kind === 'pdf') {
    const w = window.open('', '_blank');
    if (!w) { alert('Popup blockiert.'); return; }
    w.document.open(); w.document.write(item.content); w.document.close();
  } else {
    download(item.filename, item.content, item.mime);
  }
}

async function deleteArchive(id) {
  if (!confirm('Diesen Archiv-Eintrag löschen?')) return;
  await archiveDelete(id);
  await renderArchive();
}

document.getElementById('app-version').textContent = 'v' + APP_VERSION;
buildQuickBar();
initMic();
renderAll();
const n = entries.length;
setSync('ok', n ? `${n} Eintrag${n !== 1 ? 'e' : ''} geladen` : 'Bereit');
</script>
