<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f6f0d8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protokoll">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Tagesprotokoll</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Warme Palette (Gelb · Creme · Salbei · Hellgrün) — Standard: hell */
  :root {
    --bg: #f6f0d8;
    --paper: #fffdf4;
    --ink: #3c5538;
    --muted: #86926f;
    --accent: #5e8159;
    --green: #5e8159;
    --warm: #ead36a;
    --danger: #b5654a;
    --line: #e6ddba;
    --shadow: rgba(94,129,89,0.12);
    --glow: rgba(234,211,106,0.40);
    --on-accent: #fffdf4;
  }

  /* Dunkler Modus — gleiche Palette, dunkler Grund */
  html[data-theme="dark"] {
    --bg: #1b201a;
    --paper: #262c22;
    --ink: #e9ecdb;
    --muted: #8c977a;
    --accent: #9cc06f;
    --green: #9cc06f;
    --warm: #ead36a;
    --danger: #d98b6f;
    --line: #39402f;
    --shadow: rgba(0,0,0,0.45);
    --glow: rgba(234,211,106,0.14);
    --on-accent: #1b201a;
  }

  html { height: 100%; }

  body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse at 50% 0%, var(--glow) 0%, transparent 55%);
    transition: background-color 0.25s, color 0.25s;
  }

  /* TOP BAR */
  .topbar {
    background: transparent;
    color: var(--ink);
    padding: 0.9rem 1.2rem 0.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 0.7rem;
  }
  .topbar-left { display: flex; align-items: baseline; gap: 0.7rem; flex: 1; min-width: 0; }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 1.3rem;
    letter-spacing: -0.01em; line-height: 1; flex-shrink: 0;
  }
  .topbar-date {
    font-size: 0.63rem; color: var(--muted);
    letter-spacing: 0.05em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar-clock {
    font-family: 'Fraunces', serif; font-style: italic;
    font-weight: 300; font-size: 1.4rem; color: var(--accent); flex-shrink: 0;
  }
  .gear-btn {
    background: none; border: 1px solid var(--line); color: var(--accent);
    width: 2rem; height: 2rem; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  }
  .gear-btn svg { width: 1.1rem; height: 1.1rem; }
  .gear-btn:active { transform: scale(0.9) rotate(30deg); }

  /* INPUT */
  .input-wrap {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    margin: 0.5rem 1rem 0.75rem;
    padding: 0.9rem;
    flex-shrink: 0;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .input-row { display: flex; gap: 0.6rem; align-items: flex-end; }
  .input-time {
    font-size: 0.68rem; color: var(--accent);
    white-space: nowrap; padding-bottom: 0.55rem;
    letter-spacing: 0.03em; min-width: 38px; flex-shrink: 0;
  }
  #entry-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'DM Mono', monospace; font-size: 1.05rem;
    color: var(--ink); resize: none; line-height: 1.5;
    min-height: 5.5rem; max-height: 11rem; align-self: stretch;
    padding-top: 0.15rem; -webkit-appearance: none;
  }
  #entry-input::placeholder { color: var(--muted); }
  .add-btn {
    background: var(--accent); color: var(--on-accent); border: none;
    width: 3rem; height: 3rem; font-size: 1.7rem; line-height: 1;
    cursor: pointer; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .add-btn:active { transform: scale(0.92); }

  .mic-btn {
    background: var(--paper); color: var(--accent);
    border: 1px solid var(--line);
    width: 3rem; height: 3rem; line-height: 1;
    cursor: pointer; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn svg { width: 1.4rem; height: 1.4rem; }
  .mic-btn:active { transform: scale(0.92); }
  .mic-btn.recording {
    background: var(--warm); color: #5e5320; border-color: var(--warm);
    animation: micpulse 1.3s ease-out infinite;
  }
  .mic-btn.unsupported { opacity: 0.35; cursor: not-allowed; }
  @keyframes micpulse {
    0%   { box-shadow: 0 0 0 0   rgba(234,211,106,0.6); }
    70%  { box-shadow: 0 0 0 12px rgba(234,211,106,0);   }
    100% { box-shadow: 0 0 0 0   rgba(234,211,106,0);    }
  }

  /* QUICK ENTRIES */
  .quick-wrap {
    background: transparent;
    padding: 0 1rem 0.65rem;
    flex-shrink: 0;
    display: flex;
    gap: 0.45rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .quick-wrap::-webkit-scrollbar { display: none; }
  .quick-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.4rem 0.78rem;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .quick-btn:active { transform: scale(0.95); }
  .quick-btn.flash {
    background: var(--accent) !important;
    color: var(--on-accent) !important;
    border-color: var(--accent) !important;
  }

  /* ENTRIES */
  .entries-wrap {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 1rem 1rem; min-height: 0;
  }
  .date-sep {
    font-size: 0.63rem; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 1rem 0 0.3rem; border-bottom: 1px solid var(--line);
  }
  .entry {
    display: flex; gap: 0.8rem;
    padding: 0.85rem 0; border-bottom: 1px solid var(--line);
  }
  .entry-time {
    font-size: 0.68rem; color: var(--accent); white-space: nowrap;
    padding-top: 0.12rem; min-width: 38px; letter-spacing: 0.02em; flex-shrink: 0;
  }
  .entry-text {
    flex: 1; font-size: 0.9rem; line-height: 1.55; color: var(--ink);
    white-space: pre-wrap; word-break: break-word; min-width: 0;
  }
  .del-btn {
    background: none; border: none; color: var(--line); font-size: 0.95rem;
    padding: 0.1rem 0.25rem; cursor: pointer; align-self: flex-start;
    margin-top: 0.1rem; flex-shrink: 0; transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .del-btn:active { color: var(--danger); }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty .big {
    font-family: 'Fraunces', serif; font-style: italic;
    font-weight: 300; font-size: 1.25rem; margin-bottom: 0.4rem;
  }
  .empty small { font-size: 0.7rem; }

  /* BOTTOM BAR */
  .bottombar {
    background: var(--paper); border-top: 1px solid var(--line);
    padding: 0.55rem 1rem; display: flex; align-items: center;
    gap: 0.5rem; flex-shrink: 0;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0; transition: background 0.4s;
  }
  .sync-dot.ok      { background: var(--green); }
  .sync-dot.syncing { background: #e67e22; animation: blink 1s infinite; }
  .sync-dot.err     { background: var(--danger); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  #sync-text {
    color: var(--muted); font-size: 0.63rem; letter-spacing: 0.04em;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Während Modell-Download / Aufnahme / Transkription: Buttons ausblenden,
     Status-Text bekommt die volle Breite und wird prominent */
  .bottombar.busy .bottom-btn,
  .bottombar.busy .app-version,
  .bottombar.busy .export-wrap { display: none; }
  .bottombar.busy #sync-text {
    font-size: 0.8rem; color: var(--ink); letter-spacing: 0.02em;
  }
  .bottom-btn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 0.62rem;
    padding: 0.28rem 0.6rem; border-radius: 2px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bottom-btn:active { border-color: var(--ink); color: var(--ink); }
  .bottom-btn.danger { color: var(--danger); border-color: var(--danger); }

  .app-version {
    color: var(--muted);
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    opacity: 0.6;
    flex-shrink: 0;
    margin: 0 0.25rem;
    white-space: nowrap;
  }
  /* EXPORT MENU */
  .export-wrap { position: relative; flex-shrink: 0; }
  .export-menu {
    display: none;
    position: absolute;
    bottom: calc(100% + 0.4rem);
    right: 0;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: 0 4px 16px var(--shadow);
    overflow: hidden;
    min-width: 170px;
    z-index: 10;
  }
  .export-menu.open { display: block; }
  .export-menu button {
    display: block;
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 0.6rem 0.8rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink);
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .export-menu button:last-child { border-bottom: none; }
  .export-menu button:active { background: var(--bg); }
  .export-menu .hint {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.15rem;
    letter-spacing: 0;
  }

  /* ARCHIVE VIEW */
  body.view-archive .input-wrap,
  body.view-archive .quick-wrap { display: none; }

  .archive-header {
    padding: 1rem 0 0.4rem;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 0.6rem;
  }
  .archive-title {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 1.1rem; letter-spacing: -0.01em;
  }
  .archive-stats {
    font-size: 0.63rem; color: var(--muted);
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .archive-item {
    padding: 0.85rem 0; border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 0.35rem;
  }
  .archive-row1 {
    display: flex; align-items: center; gap: 0.55rem;
    font-size: 0.68rem; letter-spacing: 0.03em;
  }
  .archive-format {
    background: var(--ink); color: var(--bg);
    padding: 0.12rem 0.45rem; border-radius: 2px;
    font-weight: 500; letter-spacing: 0.06em;
  }
  .archive-format.pdf { background: var(--danger); }
  .archive-format.md  { background: var(--green); }
  .archive-date  { color: var(--muted); }
  .archive-size  { color: var(--muted); margin-left: auto; }
  .archive-name {
    font-size: 0.85rem; color: var(--ink); word-break: break-all;
  }
  .archive-actions { display: flex; gap: 0.4rem; margin-top: 0.2rem; }
  .archive-actions button {
    background: var(--paper); border: 1px solid var(--line);
    color: var(--ink); font-family: 'DM Mono', monospace;
    font-size: 0.65rem; padding: 0.3rem 0.7rem; border-radius: 2px;
    cursor: pointer; letter-spacing: 0.03em;
    -webkit-tap-highlight-color: transparent;
  }
  .archive-actions button.danger {
    color: var(--danger); border-color: var(--danger);
  }
  .archive-actions button:active { transform: scale(0.96); }
  .bottom-btn.active {
    background: var(--accent); color: var(--on-accent); border-color: var(--accent);
  }

  /* ─── SETTINGS MODAL ─── */
  .modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(20,24,16,0.45);
    display: none; align-items: flex-end; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .modal.open { display: flex; }
  .modal-card {
    background: var(--bg); width: 100%; max-width: 480px;
    max-height: 92vh; overflow-y: auto;
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.25);
    -webkit-overflow-scrolling: touch;
    animation: slideup 0.22s ease;
  }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-head {
    position: sticky; top: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.2rem 0.7rem; z-index: 2;
  }
  .modal-head span {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.25rem; color: var(--ink);
  }
  .modal-close {
    background: none; border: 1px solid var(--line); color: var(--ink);
    width: 1.9rem; height: 1.9rem; border-radius: 50%; cursor: pointer;
    font-size: 0.85rem; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .modal-body { padding: 0 1.2rem 1.6rem; }
  .set-sec { padding: 0.9rem 0; border-top: 1px solid var(--line); }
  .set-sec h3 {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 0.7rem; font-weight: 500;
  }
  .set-hint { font-size: 0.66rem; color: var(--muted); line-height: 1.5; margin-top: 0.4rem; }

  .seg { display: flex; gap: 0.4rem; }
  .seg button {
    flex: 1; background: var(--paper); border: 1px solid var(--line); color: var(--ink);
    font-family: 'DM Mono', monospace; font-size: 0.78rem; padding: 0.6rem 0.4rem;
    border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .seg button.on { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }

  .qedit-item {
    display: flex; align-items: center; gap: 0.45rem;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 10px; padding: 0.45rem 0.6rem; margin-bottom: 0.4rem;
  }
  .qedit-item .label { flex: 1; font-size: 0.82rem; color: var(--ink); word-break: break-word; }
  .qedit-item button {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1rem; padding: 0.1rem 0.35rem; flex-shrink: 0; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .qedit-item button.del { color: var(--danger); }
  .qedit-item button:disabled { opacity: 0.25; cursor: default; }

  .field-row { display: flex; gap: 0.45rem; margin-top: 0.5rem; }
  .field-row input {
    flex: 1; min-width: 0; background: var(--paper); border: 1px solid var(--line);
    color: var(--ink); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 0.55rem 0.7rem; border-radius: 10px; outline: none; -webkit-appearance: none;
  }
  .field-row input::placeholder { color: var(--muted); }
  .field-row button, .backup-btns button {
    background: var(--accent); color: var(--on-accent); border: none;
    font-family: 'DM Mono', monospace; font-size: 0.78rem; padding: 0.55rem 0.85rem;
    border-radius: 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .backup-btns { display: flex; gap: 0.45rem; flex-wrap: wrap; }
  .backup-btns button.ghost {
    background: var(--paper); color: var(--ink); border: 1px solid var(--line);
  }
  .set-about {
    text-align: center; font-size: 0.62rem; color: var(--muted);
    letter-spacing: 0.05em; padding-top: 1rem;
  }
</style>
<script>
  /* Theme so früh wie möglich setzen, damit nichts aufblitzt */
  (function(){
    try {
      var t = localStorage.getItem('proto_theme') || 'light';
      var dark = t === 'dark' ||
        (t === 'auto' && window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.setAttribute('data-theme','dark');
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', '#1b201a');
      }
    } catch(_){}
  })();
</script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>Tagesprotokoll</h1>
    <span class="topbar-date" id="top-date">—</span>
  </div>
  <div class="topbar-clock" id="top-clock">—</div>
  <button class="gear-btn" onclick="openSettings()" aria-label="Einstellungen" title="Einstellungen">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M19.14 12.94a7.49 7.49 0 0 0 .05-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.3 7.3 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.43h-3.84a.5.5 0 0 0-.5.43l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.49 7.49 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54a.5.5 0 0 0 .5.43h3.84a.5.5 0 0 0 .5-.43l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
    </svg>
  </button>
</div>

<div class="input-wrap">
  <div class="input-row">
    <span class="input-time" id="input-time">—</span>
    <textarea id="entry-input" rows="1" placeholder="Was ist gerade passiert?"></textarea>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="Diktieren" title="Diktieren — lang drücken für API-Key">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>
    <button class="add-btn" id="add-btn" onclick="addEntry()">＋</button>
  </div>
</div>

<div class="quick-wrap" id="quick-wrap"></div>

<div class="entries-wrap" id="entries-wrap">
  <div class="empty" id="empty-state">
    <div class="big">Noch nichts notiert</div>
    <small>Schreib oben deinen ersten Eintrag</small>
  </div>
</div>

<div class="bottombar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">Bereit</span>
  <span class="app-version" id="app-version" title="App-Version">v–</span>
  <button class="bottom-btn" id="archive-btn" onclick="toggleView()">📁 Archiv</button>
  <div class="export-wrap">
    <button class="bottom-btn" id="export-btn" onclick="toggleExportMenu(event)">↓ Export</button>
    <div class="export-menu" id="export-menu">
      <button onclick="exportMd()">Markdown<span class="hint">.md · Obsidian, GitHub …</span></button>
      <button onclick="exportPdf()">PDF / Drucken<span class="hint">via Browser-Druckdialog</span></button>
      <button onclick="exportTxt()">Text<span class="hint">.txt · mit UTF-8 BOM</span></button>
    </div>
  </div>
  <button class="bottom-btn danger" onclick="clearAll()">Leeren</button>
</div>

<!-- EINSTELLUNGEN -->
<div class="modal" id="settings-modal">
  <div class="modal-card">
    <div class="modal-head">
      <span>Einstellungen</span>
      <button class="modal-close" onclick="closeSettings()" aria-label="Schließen">✕</button>
    </div>
    <div class="modal-body">

      <section class="set-sec">
        <h3>Design</h3>
        <div class="seg" id="theme-seg">
          <button data-theme-val="light">Hell</button>
          <button data-theme-val="dark">Dunkel</button>
          <button data-theme-val="auto">Automatisch</button>
        </div>
      </section>

      <section class="set-sec">
        <h3>Schnellauswahl</h3>
        <div id="quick-edit-list"></div>
        <div class="field-row">

<!-- Online-Transkription über Groq (whisper-large-v3) -->
<script>
  const GROQ_ENDPOINT = 'https://api.groq.com/openai/v1/audio/transcriptions';
  const GROQ_MODEL    = 'whisper-large-v3';
  const GROQ_KEY_STORE = 'groq_api_key';

  function getGroqKey()      { return localStorage.getItem(GROQ_KEY_STORE) || ''; }
  function setGroqKey(k)     { localStorage.setItem(GROQ_KEY_STORE, (k || '').trim()); }
  function hasGroqKey()      { return getGroqKey().startsWith('gsk_'); }

  function fileExtFor(blob) {
    const t = blob.type || '';
    if (t.includes('mp4'))  return 'mp4';
    if (t.includes('ogg'))  return 'ogg';
    if (t.includes('wav'))  return 'wav';
    return 'webm';
  }

  // Transkribiert einen Audio-Blob über die Groq-API. Wirft bei Fehlern.
  async function transcribeViaGroq(blob) {
    const key = getGroqKey();
    if (!key) throw new Error('NO_KEY');

    const fd = new FormData();
    fd.append('file', blob, 'aufnahme.' + fileExtFor(blob));
    fd.append('model', GROQ_MODEL);
    fd.append('language', 'de');
    fd.append('response_format', 'json');
    // Content-Type NICHT setzen — der Browser ergänzt die multipart-boundary selbst
    const res = await fetch(GROQ_ENDPOINT, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + key },
      body: fd,
    });
    if (!res.ok) {
      let detail = '';
      try { detail = (await res.json()).error?.message || ''; } catch(_) {}
      const err = new Error('HTTP ' + res.status + (detail ? ': ' + detail : ''));
      err.status = res.status;
      throw err;
    }
    const data = await res.json();
    return (data && data.text ? data.text : '').trim();
  }
</script>

function deleteEntry(id) {

      '<div class="big">Noch nichts notiert</div>' +

// ─── ARCHIV (IndexedDB) ──────────────────────────────
const DB_NAME = 'proto_db';
const DB_STORE = 'exports';
let _dbPromise = null;
let _archiveAvailable = true;

function db() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error('no-indexeddb')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
  _dbPromise.catch(() => { _archiveAvailable = false; });
  return _dbPromise;
}

async function archivePut(item) {
  try {
    const d = await db();
    await new Promise((resolve, reject) => {
      const tx = d.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).add(item);
      tx.oncomplete = () => resolve();
      tx.onerror    = () => reject(tx.error);
    });
    if (currentView === 'archive') renderArchive();
  } catch (e) {
    console.warn('Archiv nicht verfügbar:', e);
  }
}

async function archiveList() {
  try {
    const d = await db();
    return await new Promise((resolve, reject) => {
      const items = [];
      const tx = d.transaction(DB_STORE, 'readonly');
      tx.objectStore(DB_STORE).openCursor(null, 'prev').onsuccess = (e) => {
        const c = e.target.result;
        if (c) { items.push(c.value); c.continue(); }
        else resolve(items);
      };
      tx.onerror = () => reject(tx.error);
    });
  } catch (e) { return []; }
}

async function archiveGet(id) {
  const d = await db();
  return await new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function archiveDelete(id) {
  const d = await db();
  await new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

function fmtSize(bytes) {

// ─── EXPORT HELPERS ──────────────────────────────────
function groupByDate(list) {
  const groups = {};
  const order  = [];
  list.forEach(e => {
    if (!groups[e.date]) { groups[e.date] = []; order.push(e.date); }
    groups[e.date].push(e);
  });
  return { groups, order };
}
function wrapLine(line, width) {
  if (line.length <= width) return line;
  const out = [];
  while (line.length > width) {
    let cut = line.lastIndexOf(' ', width);
    if (cut <= 0) cut = width;
    out.push(line.slice(0, cut));
    line = line.slice(line[cut] === ' ' ? cut + 1 : cut);
  }
  out.push(line);
  return out.join('\n');
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function download(filename, content, mime) {
  const url = URL.createObjectURL(new Blob([content], { type: mime }));
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function todayStamp() {
  return new Date().toLocaleDateString('de-DE',
    { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\./g,'-');
}

// ─── EXPORT: TXT ─────────────────────────────────────
// UTF-8 BOM für Windows-Notepad, Zeilen auf ~65 Zeichen umgebrochen
function exportTxt() {
  if (!entries.length) { alert('Keine Einträge.'); return; }
  const { groups, order } = groupByDate([...entries].reverse());
  let out = `TAGESPROTOKOLL\n${'='.repeat(40)}\n\n`;
  order.forEach(date => {
    out += `${date}\n${'-'.repeat(date.length)}\n\n`;
    groups[date].forEach(e => {
      const wrapped = wrapLine(e.text, 65).replace(/\n/g, '\n         ');
      out += `[${e.time}]  ${wrapped}\n\n`;
    });
  });
  const filename = `protokoll_${todayStamp()}.txt`;
  const content  = '﻿' + out;
  const mime     = 'text/plain;charset=utf-8';
  download(filename, content, mime);
  archivePut({ kind:'txt', filename, content, mime, ts: Date.now(),
               size: new Blob([content]).size, entryCount: entries.length });
  closeExportMenu();
}

// ─── EXPORT: MARKDOWN ────────────────────────────────
function exportMd() {
  if (!entries.length) { alert('Keine Einträge.'); return; }
  const { groups, order } = groupByDate([...entries].reverse());
  let out = `# Tagesprotokoll\n\n_Stand: ${new Date().toLocaleDateString('de-DE',
    { weekday:'long', day:'2-digit', month:'long', year:'numeric' })}_\n\n`;
  order.forEach(date => {
    out += `## ${date}\n\n`;
    groups[date].forEach(e => {
      const text = e.text.replace(/\n/g, '  \n  ');
      out += `- **${e.time}** — ${text}\n`;
    });
    out += `\n`;
  });
  const filename = `protokoll_${todayStamp()}.md`;
  const mime     = 'text/markdown;charset=utf-8';
  download(filename, out, mime);
  archivePut({ kind:'md', filename, content: out, mime, ts: Date.now(),
               size: new Blob([out]).size, entryCount: entries.length });
  closeExportMenu();
}

// ─── SPRACHEINGABE (Groq · whisper-large-v3, online) ─
// MediaRecorder nimmt Audio auf, der Blob geht an die Groq-API
// (siehe transcribeViaGroq). Kein Auto-Stopp — der Nutzer entscheidet,
// wann die Aufnahme endet. API-Key per Long-Press aufs Mikro.

let mediaStream  = null;
let mediaRecorder = null;
let recordChunks  = [];
let micState      = 'idle'; // 'idle' | 'loading' | 'recording' | 'transcribing'

function initMic() {
  const btn = document.getElementById('mic-btn');
  const supported =
    !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) &&
    !!window.MediaRecorder &&
    !!(window.AudioContext || window.webkitAudioContext);
  if (!supported) {
    btn.classList.add('unsupported');
    btn.title = 'Aufnahme in diesem Browser nicht unterstützt';
    btn.onclick = () => alert(
      'Audio-Aufnahme wird in diesem Browser nicht unterstützt.\n' +
      'Bitte Chrome, Edge oder Safari (aktuelle Version) verwenden.'
    );
    return;
  }
  btn.title = 'Diktieren (Groq · whisper-large-v3) — lang drücken für API-Key';

  // Long-Press auf das Mikro öffnet die API-Key-Eingabe
  let lpTimer = null, lpFired = false;
  const startLP = () => {
    lpFired = false;
    lpTimer = setTimeout(() => {
      lpFired = true;
      if (micState === 'recording') stopRecording();
      promptForGroqKey();
    }, 650);
  };
  const cancelLP = () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } };
  btn.addEventListener('pointerdown', startLP);
  btn.addEventListener('pointerup', cancelLP);
  btn.addEventListener('pointerleave', cancelLP);
  btn.addEventListener('pointercancel', cancelLP);
  // Nach einem Long-Press den darauf folgenden Klick unterdrücken
  btn.addEventListener('click', (e) => {
    if (lpFired) { e.preventDefault(); e.stopImmediatePropagation(); lpFired = false; }
  }, true);
}

function paintMic(on) {
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('recording', on);
}

async function toggleMic() {
  if (micState === 'recording')      { stopRecording(); return; }
  if (micState !== 'idle')           return; // 'loading' oder 'transcribing': ignorieren

  // Ohne API-Key keine Online-Transkription — einmalig erfassen
  if (!hasGroqKey()) {
    if (!promptForGroqKey()) {
      setSync('err', 'Kein API-Key — Diktat nicht möglich', false);
      return;
    }
  }

  startRecording();
}

// Fragt den Groq-Key ab und speichert ihn. Gibt true zurück, wenn ein
// gültig aussehender Key (gsk_…) hinterlegt wurde.
function promptForGroqKey() {
  const current = getGroqKey();
  const input = window.prompt(
    'Groq API-Key einfügen (beginnt mit gsk_…).\n' +
    'Wird nur lokal auf diesem Gerät gespeichert.',
    current
  );
  if (input === null) return hasGroqKey(); // Abbruch: vorhandenen Key behalten
  setGroqKey(input);
  return hasGroqKey();
}

async function startRecording() {
  micState = 'loading';
  setSync('syncing', 'Mikrofon wird angefragt…', true);
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    setSync('err', 'Mikrofon-Zugriff verweigert', false);
    micState = 'idle';
    return;
  }

  recordChunks = [];
  const mime = pickAudioMime();
  try {
    mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime })
                         : new MediaRecorder(mediaStream);
  } catch(e) {
    setSync('err', 'Aufnahme konnte nicht gestartet werden', false);
    cleanupStream();
    micState = 'idle';
    return;
  }
  mediaRecorder.ondataavailable = (e) => {
    if (e.data && e.data.size > 0) recordChunks.push(e.data);
  };
  mediaRecorder.onstop = onRecordingStopped;
  mediaRecorder.start();
  micState = 'recording';
  paintMic(true);
  setSync('syncing', 'Aufnahme läuft — Mikro tippen zum Stoppen', true);
  ta.focus();
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  setSync('syncing', 'Aufnahme wird beendet…', true);
  try { mediaRecorder.stop(); } catch(_) {}
  // onstop kümmert sich um den Rest
}

async function onRecordingStopped() {
  cleanupStream();
  paintMic(false);

  if (!recordChunks.length) {
    setSync('ok', 'Nichts aufgenommen', false);
    micState = 'idle';
    return;
  }
  micState = 'transcribing';
  setSync('syncing', 'Transkribiere (Groq · large-v3)…', true);

  const blob = new Blob(recordChunks, { type: recordChunks[0].type || 'audio/webm' });
  recordChunks = [];

  let text = '';
  try {
    text = await transcribeViaGroq(blob);
  } catch(e) {
    console.error(e);
    setSync('err', describeGroqError(e), false);
    micState = 'idle';
    return;
  }

  if (text) {
    const existing = ta.value.trim();
    ta.value = existing ? existing + ' ' + text : text;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 176) + 'px';
    setSync('ok', 'Fertig', false);
  } else {
    setSync('ok', 'Kein Text erkannt', false);
  }
  micState = 'idle';
}

function describeGroqError(e) {
  const msg = (e && e.message) || '';
  if (msg === 'NO_KEY')                 return 'Kein API-Key hinterlegt';
  if (e && e.status === 401)            return 'API-Key ungültig — Mikro lang drücken zum Ändern';
  if (e && e.status === 429)            return 'Groq-Limit erreicht — kurz warten';
  if (e && (e.status === 413))          return 'Aufnahme zu lang (max. 25 MB)';
  if (msg.includes('Failed to fetch') ||
      msg.includes('NetworkError'))     return 'Verbindung/CORS fehlgeschlagen — Proxy nötig?';
  return 'Transkription fehlgeschlagen';
}

function pickAudioMime() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/mp4',
    'audio/ogg;codecs=opus',
  ];
  for (const m of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

function cleanupStream() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
}

// Kompatibilitäts-Aliase für alte Aufrufstellen (z.B. addEntry)
function stopMic() {
  if (micState === 'recording') stopRecording();
}

// ─── VIEW TOGGLE: ENTRIES <-> ARCHIVE ────────────────
let currentView = 'entries';

function toggleView() {
  if (currentView === 'entries') showArchive();
  else                           showEntries();
}

function showEntries() {
  currentView = 'entries';
  document.body.classList.remove('view-archive');
  document.getElementById('archive-btn').classList.remove('active');
  document.getElementById('archive-btn').textContent = '📁 Archiv';
  renderAll();
}

async function showArchive() {
  currentView = 'archive';
  document.body.classList.add('view-archive');
  const btn = document.getElementById('archive-btn');
  btn.classList.add('active');
  btn.textContent = '← Zurück';
  await renderArchive();
}

async function renderArchive() {
  const wrap = document.getElementById('entries-wrap');
  wrap.innerHTML = '';

  const items = await archiveList();
  const totalSize = items.reduce((s, x) => s + (x.size || 0), 0);

  const head = document.createElement('div');
  head.className = 'archive-header';
  head.innerHTML =
    `<span class="archive-title">Archiv</span>` +
    `<span class="archive-stats">${items.length} ${items.length === 1 ? 'Datei' : 'Dateien'} · ${fmtSize(totalSize)}</span>`;
  wrap.appendChild(head);

  if (!items.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML =
      '<div class="big">Noch keine Exporte</div>' +
      '<small>Exportiere ein Protokoll, es landet hier automatisch.</small>';
    wrap.appendChild(empty);
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'archive-item';
    const label = item.kind === 'pdf' ? 'PDF' : item.kind.toUpperCase();
    const openLabel = item.kind === 'pdf' ? '↗ Öffnen / Drucken' : '↓ Speichern';
    div.innerHTML =
      `<div class="archive-row1">` +
        `<span class="archive-format ${item.kind}">${label}</span>` +
        `<span class="archive-date">${fmtArchiveDate(item.ts)}</span>` +
        `<span class="archive-size">${fmtSize(item.size || 0)}</span>` +
      `</div>` +
      `<div class="archive-name">${esc(item.filename)}</div>` +
      `<div class="archive-actions">` +
        `<button onclick="openArchive(${item.id})">${openLabel}</button>` +
        `<button class="danger" onclick="deleteArchive(${item.id})">Löschen</button>` +
      `</div>`;
    wrap.appendChild(div);
  });
}

async function openArchive(id) {
  const item = await archiveGet(id);
  if (!item) return;
  if (item.kind === 'pdf') {
    const w = window.open('', '_blank');
    if (!w) { alert('Popup blockiert.'); return; }
    w.document.open(); w.document.write(item.content); w.document.close();
  } else {
    download(item.filename, item.content, item.mime);
  }
}

async function deleteArchive(id) {
  if (!confirm('Diesen Archiv-Eintrag löschen?')) return;
  await archiveDelete(id);
  await renderArchive();
}

// ─── INIT ────────────────────────────────────────────
document.getElementById('app-version').textContent = 'v' + APP_VERSION;
buildQuickBar();
initMic();
renderAll();
const n = entries.length;
setSync('ok', n ? `${n} Eintrag${n !== 1 ? 'e' : ''} geladen` : 'Bereit');
</script>

<script>
// ═══ EINSTELLUNGEN · THEME · SICHERUNG ═══════════════

// ─── THEME ───────────────────────────────────────────
const THEME_STORE = 'proto_theme';
const _mql = window.matchMedia ? matchMedia('(prefers-color-scheme: dark)') : null;

function getThemePref() { return localStorage.getItem(THEME_STORE) || 'light'; }

function applyTheme(pref) {
  const dark = pref === 'dark' || (pref === 'auto' && _mql && _mql.matches);
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', dark ? '#1b201a' : '#f6f0d8');
}
function setTheme(pref) {
  localStorage.setItem(THEME_STORE, pref);
  applyTheme(pref);
  renderThemeSeg();
}
function renderThemeSeg() {
  const pref = getThemePref();
  document.querySelectorAll('#theme-seg button').forEach(b => {
    b.classList.toggle('on', b.dataset.themeVal === pref);
  });
}
if (_mql) {
  const onChange = () => { if (getThemePref() === 'auto') applyTheme('auto'); };
  _mql.addEventListener ? _mql.addEventListener('change', onChange) : _mql.addListener(onChange);
}

// ─── SETTINGS PANEL ──────────────────────────────────
function openSettings() {
  document.getElementById('set-version').textContent = APP_VERSION;
  renderThemeSeg();
  renderQuickEdit();
  document.getElementById('api-key-input').value = '';
  renderApiKeyStatus();
  renderBackupArea();
  setBackupInfo('');
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target.id === 'settings-modal') closeSettings();
});

// ─── SCHNELLAUSWAHL BEARBEITEN ───────────────────────
function renderQuickEdit() {
  const box = document.getElementById('quick-edit-list');
  box.innerHTML = '';
  if (!QUICK.length) {
    box.innerHTML = '<p class="set-hint">Noch keine Schnellauswahl.</p>';
    return;
  }
  QUICK.forEach((label, i) => {
    const row = document.createElement('div');
    row.className = 'qedit-item';
    row.innerHTML =
      `<button data-act="up"   title="Nach oben"  ${i === 0 ? 'disabled' : ''}>▲</button>` +
      `<button data-act="down" title="Nach unten" ${i === QUICK.length - 1 ? 'disabled' : ''}>▼</button>` +
      `<span class="label"></span>` +
      `<button class="del" data-act="del" title="Löschen">✕</button>`;
    row.querySelector('.label').textContent = label;
    row.querySelector('[data-act="up"]').onclick   = () => moveQuick(i, -1);
    row.querySelector('[data-act="down"]').onclick = () => moveQuick(i, 1);
    row.querySelector('[data-act="del"]').onclick  = () => removeQuickItem(i);
    box.appendChild(row);
  });
}
function commitQuick() { saveQuick(); buildQuickBar(); renderQuickEdit(); }
function addQuickItem() {
  const inp = document.getElementById('quick-add-input');
  const v = inp.value.trim();
  if (!v) return;
  QUICK.push(v);
  inp.value = '';
  commitQuick();
}
function removeQuickItem(i) { QUICK.splice(i, 1); commitQuick(); }
function moveQuick(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= QUICK.length) return;
  [QUICK[i], QUICK[j]] = [QUICK[j], QUICK[i]];
  commitQuick();
}

// ─── DIKTAT-KEY ──────────────────────────────────────
function renderApiKeyStatus() {
  const el = document.getElementById('api-key-status');
  el.textContent = hasGroqKey()
    ? '✓ Key hinterlegt — Diktat ist aktiv.'
    : 'Kein Key hinterlegt. Ohne Key kein Sprach-Diktat. Kostenlos bei console.groq.com.';
}
function saveApiKeyFromSettings() {
  const inp = document.getElementById('api-key-input');
  const v = inp.value.trim();
  if (v) setGroqKey(v);
  inp.value = '';
  renderApiKeyStatus();
}

// ─── BACKUP (Datei) ──────────────────────────────────
function backupPayload() {
  return JSON.stringify({
    app: 'tagesprotokoll',
    version: APP_VERSION,
    exportedAt: new Date().toISOString(),
    entries: entries,
    quick: QUICK,
    theme: getThemePref(),
  }, null, 2);
}
function setBackupInfo(msg) {
  const el = document.getElementById('backup-info');
  if (el) el.textContent = msg || '';
}
function downloadBackup() {
  download(`tagesprotokoll-backup_${todayStamp()}.json`, backupPayload(), 'application/json');
  setBackupInfo(`Backup gespeichert · ${entries.length} Einträge.`);
}
function restoreBackup(ev) {
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let data;
    try { data = JSON.parse(reader.result); }
    catch(_) { alert('Datei konnte nicht gelesen werden — kein gültiges Backup.'); return; }
    if (!data || !Array.isArray(data.entries)) {
      alert('Kein gültiges Tagesprotokoll-Backup.'); return;
    }
    if (!confirm(`Backup laden?\n\nErsetzt die aktuellen ${entries.length} Einträge durch ${data.entries.length} aus der Datei.`)) return;
    entries = data.entries;
    if (Array.isArray(data.quick)) {
      QUICK.length = 0;
      data.quick.forEach(q => { if (typeof q === 'string') QUICK.push(q); });
      saveQuick(); buildQuickBar(); renderQuickEdit();
    }
    if (data.theme) setTheme(data.theme);
    save();
    renderAll();
    setBackupInfo(`Backup geladen · ${entries.length} Einträge.`);
    closeSettings();
  };
  reader.readAsText(file);
}

// ─── ORDNER-AUTO-SICHERUNG (File System Access API) ──
// Nur Desktop-Chrome/Edge. Auf Android/Safari nicht verfügbar → Datei-Backup.
let _dirHandle = null;
const FS_SUPPORTED = (typeof window.showDirectoryPicker === 'function');

function fsDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('proto_fs', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
async function fsSet(key, val) {
  const d = await fsDB();
  return new Promise((res, rej) => {
    const tx = d.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(val, key);
    tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error);
  });
}
async function fsGet(key) {
  const d = await fsDB();
  return new Promise((res) => {
    const tx = d.transaction('kv', 'readonly');
    const rq = tx.objectStore('kv').get(key);
    rq.onsuccess = () => res(rq.result || null); rq.onerror = () => res(null);
  });
}
async function fsDel(key) {
  const d = await fsDB();
  return new Promise((res) => {
    const tx = d.transaction('kv', 'readwrite');
    tx.objectStore('kv').delete(key);
    tx.oncomplete = () => res(); tx.onerror = () => res();
  });
}
async function ensurePermission(h) {
  if (!h) return false;
  const opts = { mode: 'readwrite' };
  if ((await h.queryPermission(opts))   === 'granted') return true;
  if ((await h.requestPermission(opts)) === 'granted') return true;
  return false;
}
async function chooseBackupFolder() {
  if (!FS_SUPPORTED) return;
  try {
    const h = await window.showDirectoryPicker({ mode: 'readwrite' });
    _dirHandle = h;
    await fsSet('dir', h);
    await writeFolderBackup();
    renderBackupArea();
    setBackupInfo('Ordner verbunden — Auto-Sicherung aktiv.');
  } catch(_) { /* Auswahl abgebrochen */ }
}
async function disconnectBackupFolder() {
  _dirHandle = null;
  await fsDel('dir');
  renderBackupArea();
  setBackupInfo('Ordner getrennt.');
}
async function writeFolderBackup() {
  if (!_dirHandle) return;
  try {
    if (!(await ensurePermission(_dirHandle))) return;
    const fh = await _dirHandle.getFileHandle('tagesprotokoll-backup.json', { create: true });
    const w  = await fh.createWritable();
    await w.write(backupPayload());
    await w.close();
  } catch(e) { console.warn('Ordner-Backup fehlgeschlagen:', e); }
}
// Wird aus save() aufgerufen
function maybeFolderBackup() { if (FS_SUPPORTED && _dirHandle) writeFolderBackup(); }

function renderBackupArea() {
  const area = document.getElementById('folder-backup-area');
  if (!area) return;
  if (!FS_SUPPORTED) {
    area.innerHTML =
      '<p class="set-hint">Automatische Ordner-Sicherung ist auf diesem Gerät nicht verfügbar ' +
      '(z.B. Android, iPhone). Nutze „Backup speichern“ — die Datei kannst du in deiner Cloud ' +
      'oder im Dateien-Ordner ablegen und mit „Backup laden“ jederzeit wiederherstellen.</p>';
    return;
  }
  if (_dirHandle) {
    area.innerHTML =
      `<p class="set-hint">✓ Ordner verbunden: <b></b>. Jede Änderung wird automatisch dorthin gesichert.</p>` +
      `<div class="backup-btns" style="margin-top:.5rem"><button class="ghost" id="fs-disconnect">Ordner trennen</button></div>`;
    area.querySelector('b').textContent = _dirHandle.name || 'Ordner';
    document.getElementById('fs-disconnect').onclick = disconnectBackupFolder;
  } else {
    area.innerHTML =
      `<p class="set-hint">Wähle einen Ordner für die automatische Sicherung (z.B. einen Cloud-Ordner).</p>` +
      `<div class="backup-btns" style="margin-top:.5rem"><button id="fs-choose">📁 Ordner wählen</button></div>`;
    document.getElementById('fs-choose').onclick = chooseBackupFolder;
  }
}
async function initFolderBackup() {
  if (!FS_SUPPORTED) return;
  try { _dirHandle = await fsGet('dir'); } catch(_) { _dirHandle = null; }
}

// ─── INIT (Einstellungen) ────────────────────────────
document.querySelectorAll('#theme-seg button').forEach(b => {
  b.addEventListener('click', () => setTheme(b.dataset.themeVal));
});
document.getElementById('quick-add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addQuickItem(); }
});
initFolderBackup();
</script>
</body>
</html>
