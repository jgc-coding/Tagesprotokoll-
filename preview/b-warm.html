<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Design B · Warm</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:wght@400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f6f0d8;--panel:#fffdf4;--text:#3c5538;--muted:#86926f;--line:#e6ddba;--accent:#5e8159;--accent-soft:#b0cd7f;--warm:#ead36a;--cool:#bdd4e1}
  html,body{height:100%}
  body{background:#ece3c2;font-family:'DM Mono',monospace;color:var(--text);display:flex;flex-direction:column;align-items:center}
  .switch{position:sticky;top:0;z-index:10;width:100%;max-width:430px;display:flex;gap:6px;padding:8px;background:#e2d8b2}
  .switch a{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:12px;text-decoration:none;color:#86926f;background:#fffdf4}
  .switch a.on{background:var(--accent);color:#fffdf4}
  .app{width:100%;max-width:430px;flex:1;display:flex;flex-direction:column;background:var(--bg);background-image:radial-gradient(ellipse at 50% 0%,rgba(234,211,106,.4) 0%,transparent 55%);min-height:0}
  .topbar{padding:1rem 1.2rem .4rem;display:flex;align-items:baseline;justify-content:space-between}
  .topbar h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;color:var(--text)}
  .topbar .date{font-size:.6rem;color:var(--muted);letter-spacing:.12em;margin-top:2px}
  .clock{font-size:1.3rem;color:var(--accent)}
  .rt{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .themes{display:flex;gap:5px}
  .theme{font-size:.6rem;text-decoration:none;color:var(--accent);border:1px solid var(--line);border-radius:20px;padding:.2rem .55rem;letter-spacing:.05em}
  .hr{height:1px;background:var(--line);margin:.4rem 1.2rem}
  .input-wrap{padding:.4rem 1rem .75rem}
  .input-row{display:flex;gap:.6rem;align-items:flex-end;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:.9rem;min-height:7.5rem;box-shadow:0 2px 12px rgba(94,129,89,.1)}
  .input-row textarea{flex:1;align-self:stretch;background:transparent;border:none;outline:none;resize:none;font-family:'DM Mono',monospace;font-size:1.05rem;line-height:1.45;color:var(--text);padding-top:.15rem}
  .input-row textarea::placeholder{color:var(--muted)}
  .mic,.add{width:3rem;height:3rem;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border:1px solid var(--line);background:transparent}
  .mic{color:var(--accent)}.mic svg{width:1.45rem;height:1.45rem}
  .mic.rec{background:var(--warm);color:#5e5320;border-color:var(--warm);animation:pulse 1.3s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(234,211,106,.6)}70%{box-shadow:0 0 0 12px rgba(234,211,106,0)}100%{box-shadow:0 0 0 0 rgba(234,211,106,0)}}
  .add{background:var(--accent);color:#fffdf4;border:none;font-size:1.7rem;line-height:1}
  .chips{display:flex;gap:.45rem;overflow-x:auto;padding:0 1rem .6rem;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--accent);font-size:.68rem;padding:.36rem .7rem;border-radius:6px;white-space:nowrap;cursor:pointer}
  .entries{flex:1;overflow-y:auto;padding:0 1rem 1rem;min-height:0}
  .sep{padding:.6rem 0 .2rem;font-size:.6rem;color:var(--muted);letter-spacing:.2em}
  .rail{position:relative;padding-left:62px}
  .rail::before{content:"";position:absolute;left:46px;top:6px;bottom:18px;width:1.5px;background:var(--line)}
  .entry{position:relative;padding:.8rem 0}
  .entry::before{content:"";position:absolute;left:-19px;top:1.05rem;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 5px rgba(176,205,127,.3)}
  .entry .t{position:absolute;left:-62px;top:.9rem;width:36px;text-align:right;font-size:.64rem;color:var(--accent)}
  .entry .x{font-size:.86rem;line-height:1.5;color:var(--text)}
  .bottom{background:var(--panel);padding:.55rem 1rem;display:flex;align-items:center;gap:.5rem;border-top:1px solid var(--line)}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .stat{font-size:.6rem;color:var(--muted);flex:1}
  .bbtn{background:none;border:1px solid var(--line);color:var(--text);font-family:'DM Mono',monospace;font-size:.6rem;padding:.28rem .6rem;border-radius:6px}
</style>
</head>
<body>
<nav class="switch"><a href="a.html">A · Sonnenaufgang</a><a href="b-warm.html" class="on">B · Mitternacht</a><a href="c.html">C · Karten</a></nav>
<div class="app">
  <div class="topbar"><div><h1>Tagesprotokoll</h1><div class="date">DI · 22. MAI 2026</div></div><div class="rt"><div class="themes"><a class="theme" href="b.html">☾ Dunkel</a><a class="theme" href="b-hell.html">☀ Hell</a></div><div class="clock" id="clk">14:32</div></div></div>
  <div class="hr"></div>
  <div class="input-wrap"><div class="input-row">
    <textarea id="inp" rows="3" placeholder="Was ist gerade passiert?"></textarea>
    <button class="mic" id="mic" onclick="this.classList.toggle('rec')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg></button>
    <button class="add" onclick="addRow()">＋</button>
  </div></div>
  <div class="chips" id="chips"></div>
  <div class="entries"><div class="sep">// HEUTE</div><div class="rail" id="rail"></div></div>
  <div class="bottom"><div class="dot"></div><div class="stat">bereit · v11</div><button class="bbtn">Archiv</button><button class="bbtn">Export</button></div>
</div>
<script>
const CHIPS=["Wasserhahn an","Material geholt","Pause","Kunde info."];
const ROWS=[["14:18","Heizung im Bad angeschlossen, Druck geprüft."],["13:50","Material vom Großhandel geholt."],["12:30","Mittagspause."],["11:05","Wasserhahn Küche montiert — dicht."]];
chips.innerHTML=CHIPS.map(c=>`<button class="chip" onclick="document.getElementById('inp').value='${c}'">${c}</button>`).join('');
function render(){rail.innerHTML=ROWS.map(r=>`<div class="entry"><span class="t">${r[0]}</span><div class="x">${r[1]}</div></div>`).join('')}
function addRow(){const v=inp.value.trim();if(!v)return;const t=new Date().toTimeString().slice(0,5);ROWS.unshift([t,v]);inp.value='';render()}
render();setInterval(()=>{clk.textContent=new Date().toTimeString().slice(0,5)},1000);
</script>
</body>
</html>
