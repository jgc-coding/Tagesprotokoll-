<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Design A · Sonnenaufgang</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f0e8;--paper:#faf7f2;--ink:#1a1612;--muted:#9a8f82;--accent:#c0392b;--green:#2d6a4f;--line:#e2ddd6}
  html,body{height:100%}
  body{background:#3a332c;font-family:'DM Mono',monospace;color:var(--ink);display:flex;flex-direction:column;align-items:center}
  /* design switcher */
  .switch{position:sticky;top:0;z-index:10;width:100%;max-width:430px;display:flex;gap:6px;padding:8px;background:#2a241e}
  .switch a{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:12px;text-decoration:none;color:#cfc6ba;background:#3a332c}
  .switch a.on{background:var(--accent);color:#fff}
  .app{width:100%;max-width:430px;flex:1;display:flex;flex-direction:column;background:var(--bg);background-image:radial-gradient(ellipse at 80% 0%,rgba(192,57,43,0.06) 0%,transparent 55%);min-height:0}
  .topbar{background:var(--ink);color:var(--bg);padding:.85rem 1.2rem;display:flex;align-items:baseline;justify-content:space-between;gap:.8rem}
  .topbar h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.25rem}
  .topbar .date{font-size:.6rem;color:rgba(245,240,232,.5);letter-spacing:.05em;text-transform:uppercase}
  .clock{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:1.4rem;color:var(--accent)}
  .input-wrap{background:var(--paper);border-bottom:1.5px solid var(--line);padding:.75rem 1rem;box-shadow:0 2px 10px rgba(26,22,18,.06)}
  .input-row{display:flex;gap:.6rem;align-items:center}
  .input-time{font-size:.68rem;color:var(--accent)}
  .input-row input{flex:1;background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:1rem;color:var(--ink)}
  .input-row input::placeholder{color:var(--muted)}
  .mic,.add{width:2.4rem;height:2.4rem;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border:none}
  .mic{background:var(--paper);border:1px solid var(--line);color:var(--ink)}
  .mic svg{width:1.05rem;height:1.05rem}
  .mic.rec{background:var(--accent);color:#fff;animation:pulse 1.3s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.45)}70%{box-shadow:0 0 0 10px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
  .add{background:var(--accent);color:#fff;font-size:1.3rem}
  .chips{display:flex;gap:.45rem;overflow-x:auto;padding:.55rem 1rem;background:var(--bg);border-bottom:1.5px solid var(--line);scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{background:var(--paper);border:1px solid var(--line);color:var(--ink);font-size:.7rem;padding:.38rem .75rem;border-radius:20px;white-space:nowrap;cursor:pointer}
  .chip:active{background:var(--green);color:#fff;border-color:var(--green)}
  .entries{flex:1;overflow-y:auto;padding:0 1rem 1rem;min-height:0}
  .sep{display:flex;align-items:center;gap:.6rem;padding:1rem 0 .3rem;font-size:.62rem;color:var(--muted);letter-spacing:.1em}
  .sep::after{content:"";flex:1;height:1px;background:var(--line)}
  .rail{position:relative;padding-left:54px}
  .rail::before{content:"";position:absolute;left:14px;top:6px;bottom:18px;width:1.5px;background:var(--line)}
  .entry{position:relative;padding:.85rem 0;border-bottom:1px solid var(--line)}
  .entry::before{content:"";position:absolute;left:9px;top:1.05rem;width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(192,57,43,.15)}
  .entry .t{position:absolute;left:-54px;top:.95rem;width:44px;text-align:right;font-size:.66rem;color:var(--accent)}
  .entry .x{font-family:'Fraunces',serif;font-size:.98rem;line-height:1.5;color:var(--ink)}
  .bottom{background:var(--paper);border-top:1px solid var(--line);padding:.55rem 1rem;display:flex;align-items:center;gap:.5rem}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .stat{font-size:.62rem;color:var(--muted);flex:1}
  .bbtn{background:none;border:1px solid var(--line);color:var(--muted);font-family:'DM Mono',monospace;font-size:.62rem;padding:.28rem .6rem;border-radius:2px}
</style>
</head>
<body>
<nav class="switch"><a href="a.html" class="on">A · Sonnenaufgang</a><a href="b.html">B · Mitternacht</a><a href="c.html">C · Karten</a></nav>
<div class="app">
  <div class="topbar"><div><h1>Tagesprotokoll</h1><div class="date">Di., 22. Mai</div></div><div class="clock" id="clk">14:32</div></div>
  <div class="input-wrap"><div class="input-row">
    <span class="input-time" id="it">14:32</span>
    <input id="inp" placeholder="Was ist gerade passiert?">
    <button class="mic" id="mic" onclick="this.classList.toggle('rec')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg></button>
    <button class="add" onclick="addRow()">＋</button>
  </div></div>
  <div class="chips" id="chips"></div>
  <div class="entries"><div class="sep">HEUTE</div><div class="rail" id="rail"></div></div>
  <div class="bottom"><div class="dot"></div><div class="stat">Bereit · v11</div><button class="bbtn">Archiv</button><button class="bbtn">Export</button></div>
</div>
<script>
const CHIPS=["Wasserhahn an","Material geholt","Pause","Kunde info."];
const ROWS=[["14:18","Heizung im Bad angeschlossen, Druck geprüft."],["13:50","Material vom Großhandel geholt."],["12:30","Mittagspause."],["11:05","Wasserhahn Küche montiert — dicht."]];
chips.innerHTML=CHIPS.map(c=>`<button class="chip" onclick="document.getElementById('inp').value='${c}'">${c}</button>`).join('');
function render(){rail.innerHTML=ROWS.map(r=>`<div class="entry"><span class="t">${r[0]}</span><div class="x">${r[1]}</div></div>`).join('')}
function addRow(){const v=inp.value.trim();if(!v)return;const t=new Date().toTimeString().slice(0,5);ROWS.unshift([t,v]);inp.value='';render()}
render();setInterval(()=>{const t=new Date().toTimeString().slice(0,5);clk.textContent=t;it.textContent=t},1000);
</script>
</body>
</html>
